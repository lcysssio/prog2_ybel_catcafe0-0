name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'   
          java-version: '21'
          cache: gradle

      - name: Cache gradle wrapper and caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Compile (nur Kompilieren)
        run: ./gradlew -S --no-daemon compileJava

      - name: Run JUnit tests
        run: ./gradlew -S --no-daemon test

      - name: Check code formatting (Spotless)
        run: ./gradlew -S --no-daemon spotlessCheck
